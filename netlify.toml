# Netlify build config for the Rascal landing site.
#
# base = "site" scopes Netlify to the Vite project. Without it, Netlify sees the
# macOS app's Package.swift at the repo root and tries to install Swift on its
# Linux image (which fails) — the site build only needs Node.
[build]
  base = "site"
  command = "npm run build"
  publish = "../docs"

[build.environment]
  NODE_VERSION = "22"
